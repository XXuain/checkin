<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>鮮果氣泡飲 · 品項一覽</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1 class="title" id="page-title">載入中…</h1>
        <p class="subtitle" id="page-subtitle"></p>
        <div
          class="sugar-filter"
          id="sugar-filter"
          role="group"
          aria-label="糖分表顯示篩選"
          hidden
        >
          <span class="sugar-filter__label">糖分表</span>
          <div class="sugar-filter__buttons">
            <button type="button" data-filter="all" aria-pressed="true">
              全部
            </button>
            <button type="button" data-filter="base" aria-pressed="false">
              標準糖分
            </button>
            <button type="button" data-filter="addon" aria-pressed="false">
              加料減糖
            </button>
          </div>
        </div>
      </header>

      <main>
        <ul class="item-grid" id="item-grid" aria-live="polite"></ul>
      </main>

      <footer class="footer" id="footer-notes"></footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
