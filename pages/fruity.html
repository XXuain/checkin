<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>果然好滋味 · 品項一覽</title>
        <link rel="stylesheet" href="../styles.css" />
    </head>
    <body
        data-menu-data-path="../data/fruity.json"
        data-sugar-data-path="../data/sugar.json"
        data-ice-data-path="../data/ice.json"
        data-sugar-adjustment-map-key="sugar_with_no_ice_and_material_presets"
        data-sugar-adjustment-label="去冰升糖"
        data-ingredient-filter-options="多多,檸檬汁,柳橙汁,百香汁,蘋果汁,葡萄柚,葡萄汁"
    >
        <div class="page">
            <header class="header">
                <p><a class="back-link" href="../index.html">← 回首頁</a></p>
                <h1 class="title" id="page-title">載入中…</h1>
                <p class="subtitle" id="page-subtitle"></p>
                <div
                    class="sugar-filter"
                    id="sugar-filter"
                    role="group"
                    aria-label="糖分表顯示篩選"
                    hidden
                >
                    <span class="sugar-filter__label">糖分表</span>
                    <div class="sugar-filter__buttons"></div>
                </div>
                <div
                    class="sugar-filter"
                    id="ingredient-filter"
                    role="group"
                    aria-label="成分篩選"
                    hidden
                >
                    <span class="sugar-filter__label">成分表</span>
                    <div class="sugar-filter__buttons"></div>
                </div>
                <div
                    class="sugar-filter"
                    id="tea-filter"
                    role="group"
                    aria-label="茶量篩選"
                    hidden
                >
                    <span class="sugar-filter__label">茶量</span>
                    <div class="sugar-filter__buttons"></div>
                </div>
            </header>

            <main>
                <ul class="item-grid" id="item-grid" aria-live="polite"></ul>
            </main>

            <footer class="footer" id="footer-notes"></footer>
        </div>

        <script type="module" src="../app.js"></script>
    </body>
</html>
